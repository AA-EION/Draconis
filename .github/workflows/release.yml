name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install xcodegen create-dmg

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (Release)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          xcodebuild \
            -project Draconis.xcodeproj \
            -scheme Draconis \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            MARKETING_VERSION="${GITHUB_REF_NAME#v}" \
            clean build

      - name: Create DMG
        run: |
          mkdir -p dmg-staging
          cp -r "build/Build/Products/Release/Draconis.app" dmg-staging/
          create-dmg \
            --volname "Draconis" \
            --window-size 660 400 \
            --icon-size 128 \
            --icon "Draconis.app" 180 170 \
            --app-drop-link 480 170 \
            --hide-extension "Draconis.app" \
            "Draconis-${GITHUB_REF_NAME}.dmg" \
            dmg-staging/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Draconis ${{ github.ref_name }}"
          body: |
            ## Draconis ${{ github.ref_name }}

            ### Installation
            1. Download `Draconis-${{ github.ref_name }}.dmg`
            2. Open the DMG and drag **Draconis.app** to Applications
            3. Launch and follow the setup wizard

            > **Requires macOS Tahoe (26.0) or later.**
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            Draconis-${{ github.ref_name }}.dmg
