name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Fetch MaximaHelper
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash Scripts/fetch-maxima-helper.sh

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild \
            -project Draconis.xcodeproj \
            -scheme Draconis \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            clean build \
            | xcpretty || xcodebuild \
              -project Draconis.xcodeproj \
              -scheme Draconis \
              -configuration Debug \
              -derivedDataPath build \
              CODE_SIGN_IDENTITY="-" \
              CODE_SIGNING_REQUIRED=NO \
              clean build
